name: Cron competitors

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping competitor discovery
        run: curl -fsS -X GET -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" https://alphaa.app/api/cron/competitors
