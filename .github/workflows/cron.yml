name: Scheduled tasks

# Pings alphaa's cron endpoints on a schedule. Each endpoint is protected by the
# CRON_SECRET bearer token (add CRON_SECRET as a repo Actions secret — same value
# as in Railway). Optionally set an APP_URL repo variable; defaults to alphaa.app.
on:
  schedule:
    - cron: "0 13 * * 1"     # Mon 13:00 UTC — weekly reports
    - cron: "0 13 * * 1,4"   # Mon & Thu 13:00 UTC — GBP posts
    - cron: "0 6 * * 0"      # Sun 06:00 UTC — competitor discovery/refresh
  workflow_dispatch: {}      # allow manual runs (runs all three)

jobs:
  cron:
    runs-on: ubuntu-latest
    env:
      BASE: ${{ vars.APP_URL || 'https://alphaa.app' }}
    steps:
      - name: Weekly reports
        if: ${{ github.event.schedule == '0 13 * * 1' || github.event_name == 'workflow_dispatch' }}
        run: curl -fsS -X GET -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" "$BASE/api/cron/weekly"

      - name: GBP posts
        if: ${{ github.event.schedule == '0 13 * * 1,4' || github.event_name == 'workflow_dispatch' }}
        run: curl -fsS -X GET -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" "$BASE/api/cron/gbp-posts"

      - name: Competitor discovery + refresh
        if: ${{ github.event.schedule == '0 6 * * 0' || github.event_name == 'workflow_dispatch' }}
        run: curl -fsS -X GET -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" "$BASE/api/cron/competitors"
